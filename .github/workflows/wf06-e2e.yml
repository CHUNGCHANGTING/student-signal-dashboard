name: WF-06 E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'n8n-workflows/wf06-*'
      - 'n8n-workflows/broker-adapters*'
      - 'tests/test-wf06*'
      - '.github/workflows/wf06-e2e.yml'
  workflow_dispatch:  # 手動觸發

jobs:
  e2e-test:
    name: WF-06 Multi-Broker E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run E2E Tests
        env:
          TT_REFRESH_TOKEN: ${{ secrets.TT_REFRESH_TOKEN }}
          TT_ACCOUNT: ${{ secrets.TT_ACCOUNT }}
        run: |
          chmod +x tests/test-wf06-e2e.sh
          ./tests/test-wf06-e2e.sh "$TT_REFRESH_TOKEN" "${TT_ACCOUNT:-5WZ90854}"

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `❌ WF-06 E2E 測試失敗 — ${context.sha.substring(0,7)}`;
            const body = [
              `## WF-06 E2E 測試失敗`,
              ``,
              `| 項目 | 值 |`,
              `|---|---|`,
              `| Commit | \`${context.sha.substring(0,7)}\` |`,
              `| Author | ${context.actor} |`,
              `| Branch | ${context.ref} |`,
              `| Run | [查看 Actions](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) |`,
              `| Time | ${new Date().toISOString()} |`,
              ``,
              `### 請檢查`,
              `- [ ] n8n WF-06 是否 Active`,
              `- [ ] tastytrade refresh_token 是否過期`,
              `- [ ] Webhook 端點是否可達`,
              `- [ ] n8n Cloud 是否正常運作`,
            ].join('\n');
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'ci-failure']
            });
