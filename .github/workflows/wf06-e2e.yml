name: WF-06 E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'n8n-workflows/wf06-*'
      - 'n8n-workflows/broker-adapters*'
      - 'tests/test-wf06*'
      - '.github/workflows/wf06-e2e.yml'
  workflow_dispatch:  # 手動觸發

jobs:
  e2e-test:
    name: WF-06 Multi-Broker E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run E2E Tests
        env:
          TT_REFRESH_TOKEN: ${{ secrets.TT_REFRESH_TOKEN }}
          TT_ACCOUNT: ${{ secrets.TT_ACCOUNT }}
        run: |
          chmod +x tests/test-wf06-e2e.sh
          ./tests/test-wf06-e2e.sh "$TT_REFRESH_TOKEN" "${TT_ACCOUNT:-5WZ90854}"

      - name: Send failure notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "❌ WF-06 E2E 測試失敗 — ${{ github.repository }}"
          to: joseph010409@gmail.com
          from: "GitHub Actions <${{ secrets.GMAIL_USER }}>"
          body: |
            WF-06 E2E 測試在 push 到 main 後失敗。

            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Message: ${{ github.event.head_commit.message }}
            Branch: ${{ github.ref_name }}
            Time: ${{ github.event.head_commit.timestamp }}

            詳情: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ---
            請檢查:
            • n8n WF-06 是否 Active
            • tastytrade refresh_token 是否過期
            • Webhook 端點是否可達
