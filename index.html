<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>學生訊號決策台</title><style>:root{--bg:#0d1117;--c:#161b22;--c2:#1c2128;--bd:#30363d;--t:#e6edf3;--m:#8b949e;--g:#3fb950;--r:#f85149;--y:#d29922;--b:#58a6ff;--p:#bc8cff;--o:#ffa657}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--t);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}.hd{background:linear-gradient(135deg,#161b22,#1c2128);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}.hd h1{font-size:18px}.hd p{color:var(--m);font-size:12px;margin-top:2px}.tabs{display:flex;background:var(--c);border-bottom:1px solid var(--bd);padding:0 20px;overflow-x:auto}.tab{padding:11px 18px;cursor:pointer;border-bottom:3px solid transparent;color:var(--m);font-size:13px;font-weight:500;white-space:nowrap}.tab.active{color:var(--b);border-bottom-color:var(--b)}.main{padding:18px 22px;max-width:1400px;margin:0 auto}.sec{display:none}.sec.active{display:block}.card{background:var(--c);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:14px}.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:5px}.btn-p{background:var(--b);color:#000}.btn-s{background:var(--g);color:#000}.btn-g{background:transparent;color:var(--m);border:1px solid var(--bd)}.btn-w{background:var(--y);color:#000}.btn-d{background:var(--r);color:#fff}.btn-pp{background:var(--p);color:#000}.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.import-box{background:var(--c2);border:2px dashed var(--bd);border-radius:8px;padding:14px;margin-bottom:10px}.import-box textarea{width:100%;background:transparent;border:none;color:var(--t);font-family:'Courier New',monospace;font-size:12px;resize:vertical;outline:none;min-height:150px;line-height:1.6}.acc-set{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:14px}.ig{display:flex;flex-direction:column;gap:4px}.ig label{font-size:11px;color:var(--m);text-transform:uppercase}.ig input{background:var(--c2);border:1px solid var(--bd);color:var(--t);border-radius:6px;padding:7px 10px;font-size:13px;outline:none}.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px}.st{background:var(--c2);border-radius:8px;padding:12px;border:1px solid var(--bd);text-align:center}.st .v{font-size:22px;font-weight:700}.st .l{font-size:11px;color:var(--m);text-transform:uppercase;margin-top:2px}.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:14px}@media(max-width:700px){.sg{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}.sc{background:var(--c2);border:1px solid var(--bd);border-radius:10px;padding:15px;position:relative;transition:border-color .2s}.sc:hover{border-color:var(--b)}.sc.evp{border-left:3px solid var(--g)}.sc.evn{opacity:.55;border-left:3px solid var(--r)}.sc.tp{border-color:var(--y)}.sc.tp::before{content:'TOP';position:absolute;top:-1px;right:12px;background:var(--y);color:#000;font-size:10px;font-weight:700;padding:2px 8px;border-radius:0 0 6px 6px}.scmd{background:#0d1117;border:1px solid var(--bd);border-radius:6px;padding:8px 12px;font-family:'Courier New',monospace;font-size:13px;font-weight:700;color:var(--o);margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}.scmd:hover{background:var(--c2)}.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}.me{background:var(--bg);border-radius:6px;padding:7px;text-align:center}.me .ml{font-size:10px;color:var(--m);text-transform:uppercase}.me .mv{font-size:15px;font-weight:700;margin-top:2px}.cg{color:var(--g)}.cr{color:var(--r)}.cy{color:var(--y)}.cb{color:var(--b)}.cp{color:var(--p)}.pnl{display:flex;gap:6px;margin-bottom:10px}.pb{flex:1;border-radius:6px;padding:7px;text-align:center}.pw{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.25)}.pl{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.25)}.pw .vv{color:var(--g)}.pl .vv{color:var(--r)}.pb .ll{font-size:10px;color:var(--m)}.pb .vv{font-size:16px;font-weight:700}.kr{background:rgba(188,140,255,.08);border:1px solid rgba(188,140,255,.2);border-radius:6px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.kr .kl{font-size:11px;color:var(--m)}.kr .kv{font-size:18px;font-weight:800;color:var(--p)}.kr .kc{font-size:26px;font-weight:900;color:var(--p)}.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}.bg{background:rgba(63,185,80,.2);color:var(--g);border:1px solid rgba(63,185,80,.4)}.br{background:rgba(248,81,73,.2);color:var(--r);border:1px solid rgba(248,81,73,.4)}.by{background:rgba(210,153,34,.2);color:var(--y);border:1px solid rgba(210,153,34,.4)}.bb{background:rgba(88,166,255,.2);color:var(--b);border:1px solid rgba(88,166,255,.4)}.dot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:pulse 2s infinite;display:inline-block;margin-right:4px}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.tw{overflow-x:auto;border-radius:8px;border:1px solid var(--bd)}table{width:100%;border-collapse:collapse}th{background:var(--c2);padding:10px 12px;text-align:left;font-size:11px;color:var(--m);text-transform:uppercase;border-bottom:1px solid var(--bd);white-space:nowrap}td{padding:10px 12px;border-bottom:1px solid rgba(48,54,61,.5);font-size:13px;white-space:nowrap}.sr{display:flex;justify-content:space-between;font-size:11px;color:var(--m);margin-bottom:10px}.er2{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:6px 10px;background:var(--bg);border-radius:6px;margin-bottom:10px}.dc{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}.dc-ok{background:rgba(63,185,80,.2);color:var(--g)}.dc-w{background:rgba(210,153,34,.2);color:var(--y)}.dc-d{background:rgba(248,81,73,.2);color:var(--r)}</style></head><body><div class="hd"><div><h1>&#127942; &#27704;&#26085;&#39770;&#36785;&#24179;&#40517; &#31934;&#36984; TOP5 &#35759;&#34399;&#20915;&#31574;&#21488;</h1><p><span class="dot"></span>&#21010;&#26178;&#26356;&#26032; | &#23416;&#29983;&#37096;&#20301;&#31649;&#29702;&#38754;&#26495; v2.0</p></div><div style="display:flex;gap:8px"><span class="badge bg" id="ev-count">0 &#27491;EV</span><span class="badge by" id="sig-count">0 &#35759;&#34399;</span></div></div><div class="tabs"><div class="tab active" onclick="showTab(0)">&#128229; &#21319;&#20837;&#35759;&#34399;</div><div class="tab" onclick="showTab(1)">&#128202; &#35759;&#34399;&#20998;&#26512;</div><div class="tab" onclick="showTab(2)">&#128203; &#25345;&#20倉;&#32060;&#35222;</div><div class="tab" onclick="showTab(3)">&#128228; &#21319;&#20986;/&#19979;&#36617;</div></div><div class="main"><div class="sec active" id="tab0"><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:15px;font-weight:600">&#9000;&#65039; &#36148;&#20837;&#35759;&#34399;&#25991;&#23383;</span><button class="btn btn-p" onclick="parseSignals()">&#35299;&#26512;&#35759;&#34399;</button></div><div class="import-box"><textarea id="raw-input" rows="8" placeholder="&#36148;&#20837;&#35759;&#34399;..."></textarea></div><p style="font-size:11px;color:var(--m)">&#9650; &#30452;&#25509;&#36148;&#20837;&#22810;&#31508;&#35759;&#34399;&#65292;&#31995;&#32113;&#33258;&#21160;&#35299;&#26512;</p></div><div class="card"><div style="font-size:15px;font-weight:600;margin-bottom:12px">&#9881;&#65039; &#24115;&#25143;&#35373;&#23450;</div><div class="acc-set"><div class="ig"><label>&#24115;&#25143;&#32317;&#36039;&#37329;($)</label><input type="number" id="acct-size" value="7650" onchange="recalcAll()"></div><div class="ig"><label>&#27599;&#31508;&#39118;&#38570;&#19978;&#38480;(%)</label><input type="number" id="risk-pct" value="2" step="0.5" onchange="recalcAll()"></div><div class="ig"><label>&#24050;&#29992;&#39118;&#38570;&#38989;&#24230;($)</label><input type="number" id="used-risk" value="0" onchange="recalcAll()"></div><div class="ig"><label>Kelly&#20449;&#24515;&#20418;&#25976;</label><input type="number" id="kelly-conf" value="0.25" step="0.05" min="0.1" max="1" onchange="recalcAll()"></div></div></div></div><div class="sec" id="tab1"><div class="stats" id="stats-row"></div><div class="btn-row"><button class="btn btn-g" onclick="filterSig('all')">&#20840;&#37096;</button><button class="btn btn-g" onclick="filterSig('ev+')">&#20677;&#27491;EV</button><button class="btn btn-g" onclick="filterSig('bull')">&#30475;&#28966;</button><button class="btn btn-g" onclick="filterSig('bear')">&#30475;&#36291;</button></div><div class="sg" id="signal-grid"></div></div><div class="sec" id="tab2"><div class="stats" id="pos-stats"></div><div class="tw" id="pos-table"></div></div><div class="sec" id="tab3"><div class="card"><div style="font-size:15px;font-weight:600;margin-bottom:12px">&#128228; &#21319;&#20986;&#36039;&#26009;</div><div class="btn-row"><button class="btn btn-s" onclick="copyAll()">&#128203; &#35010;&#35299;&#20840;&#37096;&#35759;&#34399;</button><button class="btn btn-p" onclick="downloadCSV()">&#11015;&#65039; &#19979;&#36617; Excel CSV</button><button class="btn btn-pp" onclick="copyForComet()">&#129302; &#35010;&#35299;&#32102; Comet AI &#19979;&#21934;</button></div><div id="export-preview" style="background:var(--c2);border:1px solid var(--bd);border-radius:8px;padding:14px;font-family:monospace;font-size:12px;white-space:pre-wrap;max-height:400px;overflow-y:auto;color:var(--m)">&#35299;&#26512;&#35759;&#34399;&#24460;&#21487;&#39044;&#35230;&#21319;&#20986;&#20839;&#23481;</div></div></div></div><script>var signals=[];var curFilter='all';function showTab(n){document.querySelectorAll('.sec').forEach(function(s,i){s.classList.toggle('active',i===n)});document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',i===n)})}function gv(t,re){var m=t.match(re);return m?m[1]:'';}function gn(t,re){var m=t.match(re);return m?parseFloat(m[1]):0;}function parseSignals(){var raw=document.getElementById('raw-input').value;if(!raw.trim()){alert('Please paste signals first');return;}signals=[];var blocks=raw.split(/(?=\u3010)/);blocks.forEach(function(b){if(!b.trim())return;var s={};s.symbol=gv(b,/\u3010(.+?)\u3011/);s.price=gn(b,/\u73fe\u50f9[::\uff1a]([\d.]+)/);s.iv=gn(b,/IV[::\uff1a]([\d.]+)/);s.strategy=gv(b,/\u7b56\u7565[::\uff1a]\s*(.+)/);s.command=gv(b,/\u6307\u4ee4[::\uff1a]\s*(.+)/);s.ev=gn(b,/EV[::：]\s*([\d.-]+)/);s.winRate=gn(b,/勝率[::：]\s*([\d.]+)/);var pnlm=b.match(/盈虧[::：]\s*([\d.+-]+)\/([\d.+-]+)/);s.maxWin=pnlm?parseFloat(pnlm[1]):0;s.maxLoss=pnlm?parseFloat(pnlm[2]):0;var exm=b.match(/到期[::：]\s*([\d-]+)/);s.expiry=exm?exm[1]:'';var dm=b.match(/剩(\d+)天/);s.dte=dm?parseInt(dm[1]):0;s.isBull=s.strategy.indexOf('漲')>=0||s.strategy.indexOf('CALL')>=0;s.isBear=s.strategy.indexOf('跌')>=0||s.strategy.indexOf('PUT')>=0;s.isPositiveEV=s.ev>0;signals.push(s);});recalcAll();renderSignals();showTab(1);}function recalcAll(){var acct=parseFloat(document.getElementById('acct-size').value)||0;var riskPct=parseFloat(document.getElementById('risk-pct').value)||2;var usedRisk=parseFloat(document.getElementById('used-risk').value)||0;var kConf=parseFloat(document.getElementById('kelly-conf').value)||0.25;var riskBudget=acct*(riskPct/100);signals.forEach(function(s){if(s.winRate>0&&s.maxLoss!==0){var p=s.winRate/100;var b=Math.abs(s.maxWin/s.maxLoss);var kelly=((p*b)-(1-p))/b;s.kellyPct=Math.max(0,kelly*kConf*100);s.contracts=Math.max(1,Math.floor((acct*s.kellyPct/100)/Math.abs(s.maxLoss)));}else{s.kellyPct=0;s.contracts=0;}});}function filterSig(f){curFilter=f;renderSignals();}function renderSignals(){var filtered=signals.filter(function(s){if(curFilter==='ev+')return s.isPositiveEV;if(curFilter==='bull')return s.isBull;if(curFilter==='bear')return s.isBear;return true;});var evC=signals.filter(function(s){return s.isPositiveEV}).length;document.getElementById('ev-count').textContent=evC+' \u6b63EV';document.getElementById('sig-count').textContent=signals.length+' \u8a0a\u865f';var grid=document.getElementById('signal-grid');grid.innerHTML='';filtered.forEach(function(s,i){var cls='sc'+(s.isPositiveEV?' evp':' evn')+(i<5?' tp':'');var dteCls=s.dte<=3?'dc-d':s.dte<=7?'dc-w':'dc-ok';var dirIcon=s.isBull?'\u{1F4C8}':'\u{1F4C9}';grid.innerHTML+='<div class="'+cls+'">'+'<div class="scmd" onclick="navigator.clipboard.writeText(this.textContent)">'+s.command+'<span style="font-size:10px;color:var(--m)">COPY</span></div>'+'<div class="mg"><div class="me"><div class="ml">EV</div><div class="mv '+(s.isPositiveEV?'cg':'cr')+'">'+s.ev.toFixed(2)+'</div></div><div class="me"><div class="ml">WIN%</div><div class="mv cb">'+s.winRate+'%</div></div><div class="me"><div class="ml">IV</div><div class="mv cy">'+s.iv+'%</div></div></div>'+'<div class="pnl"><div class="pb pw"><div class="ll">MAX WIN</div><div class="vv">+'+s.maxWin+'</div></div><div class="pb pl"><div class="ll">MAX LOSS</div><div class="vv">'+s.maxLoss+'</div></div></div>'+'<div class="kr"><div><div class="kl">KELLY</div><div class="kv">'+s.kellyPct.toFixed(1)+'%</div></div><div class="kc">'+s.contracts+'</div></div>'+'<div class="er2"><span>'+s.strategy+'</span><span class="dc '+dteCls+'">'+s.dte+'D</span></div>'+'<div class="sr"><span>'+s.symbol+' $'+s.price+'</span><span>'+s.expiry+'</span></div></div>';});var sr=document.getElementById('stats-row');sr.innerHTML='<div class="st"><div class="v cb">'+signals.length+'</div><div class="l">SIGNALS</div></div><div class="st"><div class="v cg">'+evC+'</div><div class="l">+EV</div></div><div class="st"><div class="v cy">'+(signals.length>0?(signals.reduce(function(a,b){return a+b.winRate},0)/signals.length).toFixed(1):0)+'%</div><div class="l">AVG WIN%</div></div><div class="st"><div class="v cp">'+filtered.length+'</div><div class="l">FILTERED</div></div>';var pt=document.getElementById('pos-table');pt.innerHTML='<table><tr><th>Symbol</th><th>Command</th><th>EV</th><th>Win%</th><th>Kelly%</th><th>Contracts</th><th>Expiry</th><th>DTE</th></tr>'+signals.map(function(s){return '<tr><td><b>'+s.symbol+'</b></td><td style="color:var(--o)">'+s.command+'</td><td class="'+(s.isPositiveEV?'cg':'cr')+'">'+s.ev.toFixed(2)+'</td><td>'+s.winRate+'%</td><td class="cp">'+s.kellyPct.toFixed(1)+'%</td><td><b>'+s.contracts+'</b></td><td>'+s.expiry+'</td><td><span class="dc '+(s.dte<=3?'dc-d':s.dte<=7?'dc-w':'dc-ok')+'">'+s.dte+'D</span></td></tr>'}).join('')+'</table>';}function copyAll(){var t=signals.map(function(s){return s.symbol+' | '+s.command+' | EV:'+s.ev+' | Win:'+s.winRate+'% | Kelly:'+s.kellyPct.toFixed(1)+'% | Contracts:'+s.contracts+' | Exp:'+s.expiry}).join('\n');navigator.clipboard.writeText(t);alert('Copied!');}function downloadCSV(){var rows=['Symbol,Command,EV,WinRate,MaxWin,MaxLoss,Kelly%,Contracts,Expiry,DTE'];signals.forEach(function(s){rows.push(s.symbol+','+s.command+','+s.ev+','+s.winRate+','+s.maxWin+','+s.maxLoss+','+s.kellyPct.toFixed(1)+','+s.contracts+','+s.expiry+','+s.dte)});var blob=new Blob([rows.join('\n')],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='signals.csv';a.click();}function copyForComet(){var evSigs=signals.filter(function(s){return s.isPositiveEV});var t='Please execute these trades:\n';evSigs.forEach(function(s){t+=s.symbol+': '+s.command+' x'+s.contracts+' contracts (Kelly:'+s.kellyPct.toFixed(1)+'%, EV:'+s.ev+', Exp:'+s.expiry+')\n'});navigator.clipboard.writeText(t);alert('Copied for Comet AI!');document.getElementById('export-preview').textContent=t;}</script></body></html>
